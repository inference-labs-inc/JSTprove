name: Publish to crates.io

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - uses: inference-labs-inc/set-toml-version@ff9a4b64df4ce91067737822d2811a69597bf688 # v1
        with:
          version: ${{ github.event.release.tag_name }}
          files: rust/jstprove_io/Cargo.toml

      - name: Verify only version fields changed
        run: |
          git diff --name-only | sort > /tmp/changed.txt
          echo "rust/jstprove_io/Cargo.toml" | sort > /tmp/expected.txt
          diff /tmp/changed.txt /tmp/expected.txt

      - name: Package jstprove-io
        run: cargo package -p jstprove-io --allow-dirty

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: target/package/jstprove-io-*.crate

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3

      - name: Publish jstprove-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Publish attempt $attempt"
            if cargo publish -p jstprove-io --allow-dirty; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done
          exit 1
