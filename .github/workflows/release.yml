name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'test-build')) ||
      github.event_name == 'workflow_dispatch'
    uses: inference-labs-inc/release/.github/workflows/publish-release.yml@c8fedc682daa107a820a5bc1fbd03b95ff428421
    with:
      version: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.0.0-dev' }}
      rust-toolchain: nightly-2025-03-27
      version-files: |
        pyproject.toml
        rust/jstprove_pyo3/Cargo.toml
        rust/jstprove_circuits/Cargo.toml
      test-import: "from jstprove import Circuit"
      system-deps-linux: "pkgconf-pkg-config perl-IPC-Cmd perl-Time-Piece clang-devel protobuf-compiler"
      system-deps-macos: "protobuf"
      publish: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      attestations: write
